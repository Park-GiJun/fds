server:
  port: 8081

spring:
  application:
    name: fds-transaction-service
  config:
    import: configserver:${CONFIG_SERVER_URL:http://localhost:8761}
  cloud:
    config:
      username: ${CONFIG_USERNAME:config}
      password: ${CONFIG_PASSWORD}

fds:
  crypto:
    passthrough:
      enabled: ${FDS_CRYPTO_PASSTHROUGH_ENABLED:false}
