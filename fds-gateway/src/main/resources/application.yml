server:
  port: 8080

spring:
  application:
    name: fds-gateway
  config:
    import: optional:configserver:http://localhost:8761
  cloud:
    config:
      username: ${CONFIG_USERNAME:config}
      password: ${CONFIG_PASSWORD:config-secret}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
